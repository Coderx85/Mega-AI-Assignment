# Production docker-compose configuration
# Backend, Frontend, and PostgreSQL all in containers
#
# Usage: docker-compose up --build
#
# For local development without Docker, see DEVELOPMENT.md

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mega-ai-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/mydb
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mega-ai-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    container_name: mega-ai-postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
