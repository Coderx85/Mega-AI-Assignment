# Development compose file - optional PostgreSQL database
# Use this ONLY if you want to test with PostgreSQL instead of SQLite
#
# Usage:
#   docker-compose -f docker-compose.dev.yaml up -d
#   Then set APP_DATABASE_URL=postgresql+asyncpg://user:password@localhost:5432/mydb
#
# By default, the backend uses SQLite (face_detection.db) which requires NO Docker

services:
  postgres:
    image: postgres:14-alpine
    container_name: mega-ai-postgres-dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres-data:
